service: job-finder-agent

useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  memorySize: 512
  timeout: 900
  environment:
    ANTHROPIC_API_KEY: ${env:ANTHROPIC_API_KEY}
    GEMINI_API_KEY: ${env:GEMINI_API_KEY, ''}
    OPENAI_API_KEY: ${env:OPENAI_API_KEY, ''}
    MONGODB_URI: ${env:MONGODB_URI}
    GMAIL_USER: ${env:GMAIL_USER}
    GMAIL_APP_PASSWORD: ${env:GMAIL_APP_PASSWORD}
    RECIPIENT_EMAIL: ${env:RECIPIENT_EMAIL}
    TWILIO_ACCOUNT_SID: ${env:TWILIO_ACCOUNT_SID, ''}
    TWILIO_AUTH_TOKEN: ${env:TWILIO_AUTH_TOKEN, ''}
    TWILIO_WHATSAPP_FROM: ${env:TWILIO_WHATSAPP_FROM, ''}
    RECIPIENT_WHATSAPP: ${env:RECIPIENT_WHATSAPP, ''}
    JOB_ROLES: ${env:JOB_ROLES, 'Software Engineer'}
    JOB_LOCATION: ${env:JOB_LOCATION, 'India'}
    EXPERIENCE_YEARS: ${env:EXPERIENCE_YEARS, '3'}
    MIN_MATCH_SCORE: ${env:MIN_MATCH_SCORE, '60'}
    MAX_JOBS_PER_DAY: ${env:MAX_JOBS_PER_DAY, '55'}
    MAX_TO_PROCESS: ${env:MAX_TO_PROCESS, '150'}
    NODE_ENV: production

functions:
  dailyRun:
    handler: lambda.dailyRun
    events:
      - schedule:
          rate: cron(30 1 ? * MON-SAT *)
          enabled: true
          description: "Daily job finder at 7 AM IST (Mon-Sat)"

  weeklySummary:
    handler: lambda.weeklySummary
    events:
      - schedule:
          rate: cron(0 2 ? * MON *)
          enabled: true
          description: "Weekly summary every Monday 7:30 AM IST"

  manualRun:
    handler: lambda.manualRun
    events:
      - http:
          path: /run
          method: post

package:
  patterns:
    - '!.env'
    - '!logs/**'
    - '!resume/**'
    - '!.git/**'
    - '!.dockerignore'
    - '!Dockerfile'
    - '!Dockerfile.lambda'
    - '!render.yaml'
